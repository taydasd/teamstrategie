<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIRockyHockey</title>

    <!-- Styles -->
    <link href="style/bootstrap.min.css" rel="stylesheet">
    <link href="style/styles.css" rel="stylesheet">

    <!-- Script -->
    <script src="script/script.js" defer></script>
</head>

<body class="pb-2">
    <div>
        <!-- Audios -->
        <audio id="backgroundAudio" src="resources/sounds/backgroundsound.wav" loop autoplay></audio>
        <audio id="startAudio" src="resources/sounds/prepare.wav"></audio>
        <audio id="godlikeAudio" src="resources/sounds/godlike.wav"></audio>
        <audio id="unstoppableAudio" src="resources/sounds/unstoppable.wav"></audio>
    </div>

    <div>
        <!-- Videos -->
        <!-- <img id="background" src="resources/videos/background-hd720-png.apng"></img> -->
        <video id="background" src="resources/videos/background-hd720-h264.mp4" loop autoplay muted></video>
    </div>

    <div id="scoreboard">
        <!-- GIF placeholder -->
        <img id="score-gif" src="" alt="Tor-GIF">
    </div>

    <div>
        <!-- Scoreboard and timer -->
        <input disabled id="playerScoreField">
        <input disabled id="botScoreField">
        <input disabled id="countdown">

        <!-- Game controls -->
        <button id="btnStart" onclick="startGame()" type="button" class="btn btn-light">Start</button>
        <button id="btnStop" onclick="stopGame()" type="button" class="btn btn-light">Stop</button>
    </div>
</body>

</html>
