<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style/bootstrap.min.css" rel="stylesheet">

    <script src="script/script.js" defer></script>
    <title>UIRockyHockey</title>
    <style>
        
        #background-container {
            position: fixed;
            top: -54px; 
            left: 50%;
            transform: translateX(-50%);
            width: 900px; 
            height: auto; 
            z-index: 1; 
        }
        #background-image {
            width: 100%;
            height: auto;
        }

        #background-video {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            opacity: 0.9;
        }

        
        #countdown {
            position: absolute;
            top: 390px; 
            left: 458px;
            width: 95px;
            height: 40px;
            transform: translateX(-50%);
            z-index: 2;
            background-color: #333; 
            color: white; 
            padding: 10px; 
            border-radius: 5px; 
            text-align: center;
        }

        
        #scoreboard {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); 
            display: none; 
            z-index: 3;
        }

        
        #score-gif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        
        #start-button {
            position: absolute;
            top: 292px; 
            left: 408px;
            width:100px;
            background-color: green; 
            color: white;
            z-index: 2;
        }

        #stop-button {
            position: absolute;
            top: 335px; 
            left: 408px;
            width:100px;
            background-color: red; 
            color: white;
            z-index: 2;
        }

    
        #scoreRoboter {
            position: absolute;
            top: 310px; 
            left: 200px;
            width: 160px;
            height: 110px;
            z-index: 2;
            background-color: #333; 
            color: rgb(236, 150, 11);
        }

        #scoreSpieler {
            position: absolute;
            top: 310px; 
            right: 192px;
            width: 160px;
            height: 110px;
            z-index: 2;
            background-color: #333; 
            color: rgb(236, 150, 11);
        }

        #robot-label, #name-label, #name-input {
            position: absolute;
            z-index: 2;
            background-color: #333; 
            color: white; 
            padding: 10px; 
            border: none; 
            border-radius: 5px; 
            text-align: center;
        }

        #robot-label {
            top: 265px; 
            left: 200px; 
            height: 40px;
            width: 170px;
        }


        #name-input {
            top: 265px; 
            right: 188px; 
            width: 200px; 
            height: 40px;
            width: 170px;
        }
    </style>
</head>

<body class="pb-2">

    <audio id="backgroundAudio" src="resources/sounds/backgroundsound.wav" loop autoplay></audio>
    <audio id="startAudio" src="resources/sounds/prepare.wav"></audio>
    <audio id="godlikeAudio" src="resources/sounds/godlike.wav"></audio>
    <audio id="unstoppableAudio" src="resources/sounds/unstoppable.wav"></audio>

    <video id="background-video" src="resources/background-hd720-h264.mp4" loop autoplay muted></video>

   

    <div id="background-container">
        <img id="background-image" src="resources/Spielstandanzeige_EM.png" alt="Background Image">

       
        <input disabled id="countdown">

       
        <input disabled id="scoreRoboter"> 
        <input disabled id="scoreSpieler">

       
        <button id="start-button" onclick="startGame()" type="button" class="btn btn-light">Start</button>
        <button id="stop-button" onclick="stopGame()" type="button" class="btn btn-light">Stop</button>

        <label id="robot-label">RH 2024</label>
        <input id="name-input" type="text" placeholder="Dein Spielername">
    </div>

    
    <div id="scoreboard">
        <img id="score-gif" src="" alt="Tor-GIF">
    </div>
</body>

</html>
