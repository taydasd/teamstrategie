<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIRockyHockey</title>
   
    <!-- Styles -->
    <link href="style/bootstrap.min.css" rel="stylesheet">
    <link href="style/styles.css" rel="stylesheet">

    <!-- Script -->
    <script src="script/script.js" defer></script>
</head>

<body class="pb-2">

    <div>
        <!-- Audios -->
        <audio id="backgroundAudio" src="resources/sounds/backgroundsound.wav" loop autoplay></audio>
        <audio id="startAudio" src="resources/sounds/prepare.wav"></audio>
        <audio id="goalAudio" src=""></audio>
    </div>

    <div>
        <!-- Videos -->
    <video id="background-video" src="resources/videos/background-hd720-h264.mp4" loop autoplay muted></video>
    </div>
   
    <!-- Spielstandanzeige mit allen Elementen -->
    <div id="background-container">
        <img id="background-image" src="resources/Spielstandanzeige_EM.png" alt="Background Image">

        <input disabled id="countdown">
       
        <input disabled id="scoreRoboter"> 
        <input disabled id="scoreSpieler">

       
        <button id="start-button" onclick="startGame()" type="button" class="btn btn-light">Start</button>
        <button id="stop-button" onclick="stopGame()" type="button" class="btn btn-light">Stop</button>

        <label id="robot-label">RH 2024</label>
        <input id="name-input" type="text" placeholder="Dein Spielername">
    </div>

    <div id="scoreboard">
        <img id="score-gif" src="" alt="Tor-GIF">
    </div>
</body>

</html>
