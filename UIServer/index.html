<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style/bootstrap.min.css" rel="stylesheet">

    <script src="script/script.js" defer></script>
    <title>UIRockyHockey</title>
    <style>
        #background {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        #countdown {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
        }

        #scoreboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
        }

        #score-gif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body class="pb-2">

    <div>
        <audio id="backgroundAudio" src="resources/sounds/backgroundsound.wav" loop autoplay></audio>
        <audio id="startAudio" src="resources/sounds/prepare.wav"></audio>
        <audio id="godlikeAudio" src="resources/sounds/godlike.wav"></audio>
        <audio id="unstoppableAudio" src="resources/sounds/unstoppable.wav"></audio>
    </div>

    <div>
        <!-- <img id="background" src="resources/background-hd720-png.apng"></img> -->
        <video id="background" src="resources/background-hd720-h264.mp4" loop autoplay muted></video>
    </div>

    <div id="scoreboard">
        <img id="score-gif" src="" alt="Tor-GIF">
    </div>

    <div>
        <input disabled id="gpio5" style="position: fixed; top: 10%; left: 5%;">
        <input disabled id="gpio6" style="position: fixed; top: 10%; right: 5%;">
        <input disabled id="countdown">

        <button onclick="startGame()" type="button" class="btn btn-light"
            style="position: fixed; bottom: 10%; left: 5%">Start</button>
        <button onclick="stopGame()" type="button" class="btn btn-light"
            style="position: fixed; bottom: 10%; right: 5%">Stop</button>
    </div>
</body>

</html>
